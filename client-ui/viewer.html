<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeloDesk - Remote Session</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        #status-bar {
            height: 30px;
            background: rgba(20, 20, 20, 0.9);
            color: #b53dd2;
            display: flex;
            align-items: center;
            padding: 0 15px;
            font-size: 12px;
            border-bottom: 1px solid #333;
            z-index: 10;
        }
        #video-container {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: none; /* Hide cursor by default, will show custom or use remote */
        }
        video {
            max-width: 100%;
            max-height: 100%;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .loading-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            transition: opacity 0.5s;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(181, 61, 210, 0.3);
            border-top: 3px solid #b53dd2;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="status-bar">
        <span id="target-name">Conectando...</span>
        <span style="margin: 0 10px;">|</span>
        <span id="status-msg">Iniciando P2P</span>
        <button id="disconnectBtn" style="margin-left: auto; background: #ff4444; border: none; color: white; padding: 2px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold;">DESCONECTAR</button>
    </div>

    <div id="video-container">
        <video id="remoteVideo" autoplay playsinline></video>
        <div id="loading" class="loading-overlay">
            <div class="spinner"></div>
            <div id="loading-text">Conectando ao Dispositivo...</div>
            <div id="viewerDebug" style="font-family: monospace; font-size: 10px; margin-top: 20px; color: #888; max-height: 100px; overflow-y: auto;"></div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script src="viewer.js"></script>
</body>
</html>
